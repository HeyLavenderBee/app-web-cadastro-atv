<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | Cadastro</title>
</head>
<body>
    <main class="card">
        <h1 class="title">Cadastro de Usuários</h1>
        <div class="form-input">
            <input class="text-input" id="user-name" type="text" placeholder="Digite o nome do usuário">
            <input class="text-input" id="user-email" type="email" placeholder="Digite o email">
        </div>
        <div class="buttons">
            <button class="button button-primary" id="save-user">Salvar</button>
            <button class="button button-secondary" id="clear-user">Limpar</button>
        </div>
        <section id="result"></section>
        <section class="user-list">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">

                </tbody>
            </table>
        </section>
    </main>
    <script src="/assets/js/main.js"></script>
</body>
</html>
