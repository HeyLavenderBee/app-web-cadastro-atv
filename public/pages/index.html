<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="">
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | Cadastro</title>
</head>
<body>
    <main class="card">
        <h1 class="title">Cadastro de Usuários</h1>
        <div class="form-input">
            <input class="text-input" type="text" placeholder="Digite o nome do usuário">
            <input class="text-input" type="email" placeholder="Digite o email">
        </div>
        <div class="buttons">
            <button class="button save-button">Salvar</button>
            <button class="button">Limpar</button>
        </div>
        <div class="result-message">
            Mensagem
        </div>
        <div class="result-table">
            Tabela
        </div>
    </main>
</body>
</html>
